{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MockInterview{% endblock %}</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'interviews/styles.css' %}">
    <style>
        .header
        {
            background-color: #343a40;
            width: 100%;
            display: flex;
            justify-content: center;
        }
        #nav-items a {
            font-weight: bolder;
        }
        #nav-items a:hover {
            color: #fff;
        }
    </style>
    
</head>
<body>
    <header class="header">
    <nav class="navbar navbar-expand-lg navbar-dark " style="max-width: 1400px; display: flex; justify-content: space-between; width: 100%;">
       <nav class="navbar navbar-expand-lg">
        <a class="navbar-brand d-flex align-items-center gap-2" href="#">
            <svg width="34" height="34" viewBox="0 0 110 110" xmlns="http://www.w3.org/2000/svg">
            <rect width="110" height="110" rx="22" fill="#2563EB"/>
            <rect x="43" y="18" width="24" height="38" rx="12" fill="white"/>
            <path d="M28 52 Q28 78 55 78 Q82 78 82 52" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"/>
            <line x1="55" y1="78" x2="55" y2="90" stroke="white" stroke-width="4" stroke-linecap="round"/>
            <line x1="42" y1="90" x2="68" y2="90" stroke="white" stroke-width="4" stroke-linecap="round"/>
            <rect x="62" y="12" width="30" height="22" rx="7" fill="#93C5FD"/>
            <polygon points="66,34 60,42 74,34" fill="#93C5FD"/>
            <circle cx="71" cy="23" r="2.5" fill="#1D4ED8"/>
            <circle cx="79" cy="23" r="2.5" fill="#1D4ED8"/>
            <circle cx="87" cy="23" r="2.5" fill="#1D4ED8"/>
            </svg>
            <span><span style="color:#2563EB;font-weight:600; margin-left: 5px; font-size: larger;">Mock</span>Interview</span>
        </a>
        </nav>
        <div class="navbar-nav ml-auto" id="nav-items">
            {% if user.is_authenticated %}
                <a class="nav-link" href="{% url 'interviews:new_exam' %}" >New Exam</a>
                <a class="nav-link" href="{% url 'interviews:history' %}">History</a>
                <a class="nav-link" href="{% url 'interviews:stats' %}">Stats</a>
                <a class="nav-link" href="{% url 'interviews:logout' %}">Logout ({{ user.username }})</a>
            {% else %}
                <a class="nav-link" href="{% url 'interviews:login' %}">Login</a>
                <a class="nav-link" href="{% url 'interviews:register' %}">Register</a>
            {% endif %}
        </div>
    </nav>
    </header>
    <div style="display: flex; width: 100%; justify-content: center; margin-top: 30px;">
        <div style="display: flex; flex-direction: column; width: 100%; max-width: 1400px; height: 80vh; padding: 28px;">
        {% block body %}{% endblock %}
        </div>
    </div>

    <script src="{% static 'interviews/app.js' %}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
