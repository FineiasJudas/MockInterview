{% extends "interviews/layout.html" %}
{% block title %}Login{% endblock %}
{% block body %}
<div style="max-width: 400px; margin: auto; background-color: #e7e7e7; padding: 50px 30px; border-radius: 10px;border: solid #cdcdcd 1px;">
    <h2 style="text-align: center;margin-bottom: 30px;">Login</h2>
    {% if message %}<div class="alert alert-danger">{{ message }}</div>{% endif %}
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label style="text-align: end;">Username</label>
            <input type="text" name="username" class="form-control" required placeholder="Username">
        </div>
        <div class="form-group">
            <label style="text-align: start;">Password</label>
            <input type="password" name="password" class="form-control" required placeholder="Password">
        </div>
        <div style="display: flex;flex-direction: column; gap: 8px; text-align: center;">
            <button type="submit" class="btn btn-primary">Login</button>
            <a href="{% url 'interviews:register' %}" class="btn btn-link">Register</a>
        </div>
    </form>
</div>
{% endblock %}
