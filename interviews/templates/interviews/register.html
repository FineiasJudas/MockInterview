{% extends "interviews/layout.html" %}
{% block title %}Register{% endblock %}
{% block body %}
<div style="max-width: 400px; margin: auto; background-color: #e7e7e7; padding: 50px 40px; border-radius: 10px;border: solid #cdcdcd 1px;">
    <h2 style="text-align: center;margin-bottom: 30px;">Register</h2>
    {% if message %}<div class="alert alert-danger">{{ message }}</div>{% endif %}
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" class="form-control" required placeholder="Username">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" class="form-control" required placeholder="Email">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" class="form-control" required placeholder="Password">
        </div>

        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" name="confirmation" class="form-control" required placeholder="Confirm Password">
        </div>

        <div style="display: flex;flex-direction: column; gap: 8px; text-align: center;">
            <button type="submit" class="btn btn-primary">Register</button>
            <a href="{% url 'interviews:login' %}" class="btn btn-link">Already have an account?</a>
        </div>
    </form>
</div>
{% endblock %}
